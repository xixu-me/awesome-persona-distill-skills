name: Process Approved Submission

on:
  issues:
    types:
      - labeled

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: submission-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  create-pr:
    if: github.event.label.name == 'approved' && github.event.issue.pull_request == null
    runs-on: ubuntu-latest
    steps:
      - name: Check for existing automation PR
        id: existing-pr
        uses: actions/github-script@v7
        with:
          script: |
            const branch = `auto/submission-issue-${context.payload.issue.number}`;
            const pulls = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              head: `${context.repo.owner}:${branch}`,
            });

            core.setOutput("exists", pulls.length > 0 ? "true" : "false");
            core.setOutput("url", pulls[0]?.html_url ?? "");

      - name: Comment when a PR already exists
        if: steps.existing-pr.outputs.exists == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const body = `An automated pull request already exists for this submission: ${process.env.PR_URL}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body,
            });
        env:
          PR_URL: ${{ steps.existing-pr.outputs.url }}

      - name: Check out repository
        if: steps.existing-pr.outputs.exists != 'true'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        if: steps.existing-pr.outputs.exists != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.existing-pr.outputs.exists != 'true'
        run: npm ci

      - name: Check for existing remote branch
        if: steps.existing-pr.outputs.exists != 'true'
        id: existing-branch
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          branch="auto/submission-issue-${ISSUE_NUMBER}"
          if git ls-remote --exit-code --heads origin "${branch}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment when a remote branch already exists
        if: steps.existing-pr.outputs.exists != 'true' && steps.existing-branch.outputs.exists == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const branch = `auto/submission-issue-${context.payload.issue.number}`;
            const body = `The automation branch \`${branch}\` already exists. Please inspect it before relabeling this issue.`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body,
            });

      - name: Apply submission to READMEs
        if: steps.existing-pr.outputs.exists != 'true' && steps.existing-branch.outputs.exists != 'true'
        id: apply
        continue-on-error: true
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          node scripts/submission-automation.mjs > submission-result.json 2> submission-error.log

      - name: Comment on validation failure
        if: steps.apply.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("node:fs");
            const errorBody = fs.existsSync("submission-error.log")
              ? fs.readFileSync("submission-error.log", "utf8").trim()
              : "The submission automation failed without an explicit error message.";
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `The automated PR could not be created for this issue.\n\n${errorBody}`,
            });

      - name: Stop after validation failure
        if: steps.apply.outcome == 'failure'
        run: exit 1

      - name: Detect no-op changes
        if: steps.apply.outcome == 'success'
        id: diff
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment when no changes were produced
        if: steps.apply.outcome == 'success' && steps.diff.outputs.has_changes != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: "The automation did not produce README changes. This usually means the repository is already listed or the issue body needs review.",
            });

      - name: Stop when no changes were produced
        if: steps.apply.outcome == 'success' && steps.diff.outputs.has_changes != 'true'
        run: exit 1

      - name: Configure git author
        if: steps.diff.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create remote branch reference
        if: steps.diff.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        with:
          script: |
            const branch = `auto/submission-issue-${process.env.ISSUE_NUMBER}`;
            const defaultBranch = context.payload.repository.default_branch;
            const { data: branchInfo } = await github.rest.repos.getBranch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              branch: defaultBranch,
            });

            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/heads/${branch}`,
              sha: branchInfo.commit.sha,
            });

      - name: Create branch, commit, and push
        if: steps.diff.outputs.has_changes == 'true'
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          branch="auto/submission-issue-${ISSUE_NUMBER}"
          git checkout -b "${branch}"
          git add README.md README.en.md
          git commit -m "docs: add submission from issue #${ISSUE_NUMBER}"
          git push origin HEAD:"${branch}"

      - name: Create pull request
        if: steps.diff.outputs.has_changes == 'true'
        id: create-pr
        uses: actions/github-script@v7
        with:
          script: |
            const branch = `auto/submission-issue-${context.payload.issue.number}`;
            const response = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `docs: add submission from issue #${context.payload.issue.number}`,
              head: branch,
              base: "main",
              body: [
                `Automated submission PR for #${context.payload.issue.number}.`,
                "",
                `Source issue: #${context.payload.issue.number}`,
                "",
                "This PR was generated after a maintainer added the `approved` label.",
              ].join("\n"),
            });

            core.setOutput("number", String(response.data.number));
            core.setOutput("url", response.data.html_url);

      - name: Merge pull request
        if: steps.create-pr.outputs.number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const pull_number = Number(process.env.PR_NUMBER);
            let lastError = null;

            for (let attempt = 1; attempt <= 12; attempt += 1) {
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number,
              });

              if (pr.merged || pr.state === "closed") {
                core.info(`Pull request #${pull_number} is already closed.`);
                return;
              }

              if (pr.mergeable === false && pr.mergeable_state === "behind") {
                core.info(
                  `Pull request #${pull_number} is behind the base branch. Updating branch before merge.`,
                );
                await github.rest.pulls.updateBranch({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number,
                });
                await new Promise((resolve) => setTimeout(resolve, 5000));
                continue;
              }

              if (
                pr.mergeable === null ||
                pr.mergeable_state === "unknown" ||
                pr.mergeable_state === "unstable"
              ) {
                core.info(
                  `Mergeability for PR #${pull_number} is still being computed (attempt ${attempt}/12).`,
                );
                await new Promise((resolve) => setTimeout(resolve, 5000));
                continue;
              }

              try {
                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number,
                  merge_method: "squash",
                  sha: pr.head.sha,
                });
                core.info(`Merged pull request #${pull_number}.`);
                return;
              } catch (error) {
                lastError = error;
                const message = error?.response?.data?.message ?? error.message;
                const shouldRetry =
                  error.status === 405 &&
                  /Base branch was modified|not mergeable/i.test(message);

                if (!shouldRetry || attempt === 12) {
                  throw error;
                }

                core.warning(
                  `Merge attempt ${attempt}/12 for PR #${pull_number} failed: ${message}`,
                );
                await new Promise((resolve) => setTimeout(resolve, 5000));
              }
            }

            throw lastError ?? new Error(`Unable to merge PR #${pull_number}.`);
        env:
          PR_NUMBER: ${{ steps.create-pr.outputs.number }}

      - name: Comment with merged PR link
        if: steps.create-pr.outputs.url != ''
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `An automated pull request has been created and merged for this approved submission: ${process.env.PR_URL}`,
            });
        env:
          PR_URL: ${{ steps.create-pr.outputs.url }}
